<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LandrianiBlenkmann · Performance Marketing & Recruitment</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --verde:#1F6C43; --verde-dark:#155232; --oro:#D4AF37; --oro-dark:#b8960f;
  --bg:#f8f9fa; --surface:#ffffff; --text:#1a1a1a; --muted:#6c757d; --border:#e9ecef;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);padding-bottom:50px}

header{background:var(--verde-dark);color:white;padding:15px 30px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:700}
.logo span{color:var(--oro)}

.nav-tabs{display:flex;background:white;padding:10px 30px;gap:20px;border-bottom:1px solid var(--border)}
.tab{cursor:pointer;padding:8px 16px;border-radius:6px;font-weight:500;color:var(--muted);transition:0.3s}
.tab.active{background:var(--verde-xs);color:var(--verde);background:#e8f5ee}

.container{max-width:1400px;margin:30px auto;padding:0 20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));gap:20px;margin-bottom:30px}

.card{background:white;padding:25px;border-radius:12px;border:1px solid var(--border);box-shadow:0 2px 4px rgba(0,0,0,.02)}
.card-title{font-family:'Playfair Display',serif;font-size:18px;margin-bottom:20px;color:var(--verde-dark)}

.kpi-val{font-size:32px;font-weight:700;color:var(--verde);font-family:'Playfair Display',serif}
.kpi-label{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:5px}

.funnel-item{margin-bottom:10px;display:flex;flex-direction:column;align-items:center}
.stage{padding:12px;color:white;border-radius:6px;display:flex;justify-content:space-between;width:100%;font-weight:600;font-size:13px}
.conv-label{font-size:11px;color:var(--verde);font-weight:700;margin:4px 0}

.tag{padding:4px 8px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase}
.tag-meta{background:#e3f2fd;color:#0d47a1}

table{width:100%;border-collapse:collapse}
th{text-align:left;padding:12px;font-size:11px;color:var(--muted);text-transform:uppercase;border-bottom:2px solid var(--border)}
td{padding:12px;border-bottom:1px solid var(--border);font-size:14px}

.sync-status{display:flex;align-items:center;gap:8px;font-size:11px}
.dot{width:8px;height:8px;border-radius:50%;background:#4ade80}
.dot.loading{animation:blink 1s infinite;background:var(--oro)}
@keyframes blink{50%{opacity:0.2}}
</style>
</head>
<body>

<header>
  <div class="logo">Landriani<span>Blenkmann</span></div>
  <div class="sync-status">
    <div id="dot" class="dot"></div>
    <span id="status-text">Conectado</span>
  </div>
</header>

<div class="nav-tabs">
  <div class="tab active" onclick="switchView('dash', this)">📊 Dashboard</div>
  <div class="tab" onclick="switchView('cands', this)">👥 Candidatos</div>
  <div class="tab" onclick="switchView('rank', this)">🏆 Ranking</div>
</div>

<div class="container">
  
  <div style="margin-bottom:20px">
    <select id="sel-cohorte" onchange="renderAll()" style="padding:10px;border-radius:6px;border:1px solid var(--border)">
      <option value="">Todas las Cohortes</option>
    </select>
  </div>

  <!-- DASHBOARD VIEW -->
  <div id="v-dash" class="view">
    <div class="grid" id="kpi-box"></div>
    
    <div style="display:grid; grid-template-columns: 1.5fr 1fr; gap:20px">
      <div class="card">
        <div class="card-title">Embudo de Conversión (Marketing → Ingreso)</div>
        <div id="funnel-box"></div>
      </div>
      <div class="card">
        <div class="card-title">Eficiencia de Adquisición</div>
        <div id="eff-box"></div>
      </div>
    </div>
  </div>

  <!-- CANDIDATOS VIEW -->
  <div id="v-cands" class="view" style="display:none">
    <div class="card">
      <table>
        <thead>
          <tr><th>Nombre</th><th>Cohorte</th><th>Fuente</th><th>Estado</th><th>Score</th></tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>

  <!-- RANKING VIEW -->
  <div id="v-rank" class="view" style="display:none">
    <div class="grid" id="ranking-grid"></div>
  </div>

</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzIocsnWXZkuUXRuM7xZFAVnIY-oDQj3fzOv4tvWUfqLtH_WIJOL9zDpfxRPB8y8smBRQ/exec";
let STORE = { candidatos:[], entrevistas:[], finanzas:[], impresiones:[] };

async function sync() {
  document.getElementById('dot').classList.add('loading');
  document.getElementById('status-text').textContent = "Sincronizando...";

  const cb = 'jsonp_' + Math.round(Math.random()*1000000);
  const s = document.createElement('script');
  s.src = `${SCRIPT_URL}?accion=todos&callback=${cb}`;
  
  window[cb] = (res) => {
    STORE = res.data;
    if(document.getElementById('sel-cohorte').options.length <= 1) populateFilter();
    renderAll();
    document.getElementById('dot').classList.remove('loading');
    document.getElementById('status-text').textContent = "Actualizado";
    delete window[cb];
    document.head.removeChild(s);
  };
  document.head.appendChild(s);
}

function populateFilter() {
  const coh = [...new Set(STORE.candidatos.map(c => c.cohorte))].sort().reverse();
  const sel = document.getElementById('sel-cohorte');
  coh.forEach(c => sel.add(new Option(c, c)));
}

function renderAll() {
  const f = document.getElementById('sel-cohorte').value;
  const cands = f ? STORE.candidatos.filter(c => c.cohorte === f) : STORE.candidatos;
  const imps = f ? STORE.impresiones.filter(i => i.cohorte === f) : STORE.impresiones;
  
  const mImps = imps.reduce((a,b) => a + b.impresiones, 0);
  const mRes = imps.reduce((a,b) => a + b.resultados, 0);
  const mGastado = imps.reduce((a,b) => a + b.gastado, 0);
  const cIngresados = cands.filter(c => c.estado === 'Ingresado').length;

  // KPIs
  document.getElementById('kpi-box').innerHTML = `
    <div class="card"><div class="kpi-label">Inversión Meta</div><div class="kpi-val">$${mGastado.toLocaleString('es-AR')}</div></div>
    <div class="card"><div class="kpi-label">Leads Totales</div><div class="kpi-val">${cands.length}</div></div>
    <div class="card"><div class="kpi-label">Costo x Lead</div><div class="kpi-val">$${cands.length ? Math.round(mGastado/cands.length) : 0}</div></div>
    <div class="card"><div class="kpi-label">Costo x Ingreso</div><div class="kpi-val" style="color:var(--oro-dark)">$${cIngresados ? Math.round(mGastado/cIngresados) : 0}</div></div>
  `;

  // FUNNEL
  const stages = [
    {n: mImps, l: 'Impresiones (Ads)', c: '#adb5bd'},
    {n: imps.reduce((a,b) => a + b.alcance, 0), l: 'Alcance', c: '#868e96'},
    {n: mRes, l: 'Leads (Meta)', c: '#4f46e5'},
    {n: cands.length, l: 'Leads (Base de Datos)', c: '#4338ca'},
    {n: STORE.entrevistas.filter(e => !f || e.cohorte === f).length, l: 'Entrevistados', c: '#f59e0b'},
    {n: cIngresados, l: 'Ingresos Efectivos', c: '#1F6C43'}
  ];

  document.getElementById('funnel-box').innerHTML = stages.map((s, i) => {
    const w = 100 - (i*8);
    const conv = (i>0 && stages[i-1].n > 0) ? `⬇ Eficiencia: ${((s.n/stages[i-1].n)*100).toFixed(1)}%` : '';
    return `
      <div class="funnel-item" style="width:${w}%">
        <div class="conv-label">${conv}</div>
        <div class="stage" style="background:${s.c}">${s.l} <span>${s.n.toLocaleString('es-AR')}</span></div>
      </div>
    `;
  }).join('');

  // TABLA
  document.getElementById('table-body').innerHTML = cands.map(c => `
    <tr>
      <td style="font-weight:700">${c.nombre}</td>
      <td>${c.cohorte}</td>
      <td><span class="tag tag-meta">${c.fuente}</span></td>
      <td><span style="color:var(--verde); font-weight:700">${c.estado}</span></td>
      <td>${c.score}</td>
    </tr>
  `).join('');

  // RANKING
  const rank = STORE.entrevistas.filter(e => !f || e.cohorte === f).sort((a,b) => b.total - a.total);
  document.getElementById('ranking-grid').innerHTML = rank.map(r => `
    <div class="card" style="border-left: 6px solid ${r.total > 25 ? 'var(--verde)' : 'var(--oro)'}">
      <div class="kpi-label">${r.cohorte}</div>
      <div style="font-family:Playfair Display; font-size:20px; font-weight:700">${r.candidato}</div>
      <div style="font-size:24px; color:var(--verde); margin:10px 0">${r.total}/35</div>
      <div style="font-size:12px"><strong>Fortaleza:</strong> ${r.fortaleza}</div>
    </div>
  `).join('');
}

function switchView(v, el) {
  document.querySelectorAll('.view').forEach(x => x.style.display = 'none');
  document.getElementById('v-'+v).style.display = 'block';
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
}

sync();
setInterval(sync, 60000); // Auto-sync cada minuto
</script>
</body>
</html>
