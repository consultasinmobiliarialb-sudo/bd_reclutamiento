<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LB BI Hub v8.0</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --verde:#1F6C43; --verde-dark:#155232; --oro:#D4AF37; --oro-dark:#b8960f;
  --bg:#f2f4f3; --surface:#ffffff; --text:#1a1a1a; --muted:#6c757d; --border:#d8dedb;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);padding-bottom:50px}

/* HEADER & FILTERS */
header{background:var(--verde-dark);color:white;padding:15px 40px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:1000}
.logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:700}
.logo span{color:var(--oro)}

.filter-bar{background:white;padding:20px 40px;border-bottom:1px solid var(--border);display:flex;gap:20px;align-items:center}
.f-group{display:flex;flex-direction:column;gap:5px}
.f-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase}
.f-select{padding:10px;border-radius:8px;border:1px solid var(--border);min-width:200px;font-weight:600}

.cost-banner{background:white;padding:12px 25px;border-radius:10px;border:1px solid var(--border);border-left:5px solid var(--oro);font-size:13px}

/* DASHBOARD GRID */
.container{max-width:1650px;margin:30px auto;padding:0 40px}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));gap:20px;margin-bottom:30px}
.kpi-card{background:white;padding:25px;border-radius:15px;border:1px solid var(--border);border-top:5px solid var(--verde)}
.kpi-val{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;color:var(--verde-dark)}
.kpi-lbl{font-size:12px;text-transform:uppercase;color:var(--muted);font-weight:700}

.main-grid{display:grid;grid-template-columns: 1fr 1.1fr; gap:30px}
.card{background:white;padding:30px;border-radius:15px;border:1px solid var(--border);margin-bottom:30px}
.card-h{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:25px;color:var(--verde-dark);border-bottom:2px solid var(--bg);padding-bottom:15px}

/* FUNNELS */
.funnel-stage{margin-bottom:10px;display:flex;flex-direction:column;align-items:center}
.stage-pill{padding:12px 18px;color:white;border-radius:8px;display:flex;justify-content:space-between;width:100%;font-weight:700;font-size:13px;box-shadow:0 3px 6px rgba(0,0,0,0.08)}
.conv-arrow{font-size:11px;color:var(--verde);font-weight:800;padding:5px 0}

/* TIMES */
.time-grid{display:grid;grid-template-columns:repeat(2, 1fr);gap:15px}
.time-item{background:white;padding:25px;border-radius:15px;text-align:center;border:1px solid var(--border)}
.time-val{font-size:32px;font-weight:700;color:var(--verde-dark);display:block}
.time-lbl{font-size:10px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-top:8px}

/* BARS */
.bar-row{margin-bottom:15px}
.bar-txt{display:flex;justify-content:space-between;font-size:12px;font-weight:700;margin-bottom:6px}
.bar-track{background:#e9ecef;height:12px;border-radius:6px;overflow:hidden}
.bar-fill{height:100%;background:var(--verde);border-radius:6px;transition:width 1s ease}

/* RANKING */
.rank-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(350px, 1fr));gap:25px}
.rank-card{border-left:8px solid var(--oro);position:relative}
.score-badge{position:absolute;top:25px;right:25px;font-size:26px;font-family:'Playfair Display',serif;font-weight:700;color:var(--verde)}

.sync-status{display:flex;align-items:center;gap:10px;font-size:12px}
.dot{width:10px;height:10px;border-radius:50%;background:#4ade80}
.dot.loading{animation:pulse 1s infinite;background:var(--oro)}
@keyframes pulse{50%{opacity:0.2}}
</style>
</head>
<body>

<header>
  <div class="logo">Landriani<span>Blenkmann</span>Hub v8.0</div>
  <div class="sync-status">
    <div id="sync-dot" class="dot"></div>
    <span id="sync-msg">Cargando...</span>
  </div>
</header>

<div class="filter-bar">
  <div class="f-group">
    <label class="f-label">Seleccionar Cohorte</label>
    <select id="sel-cohorte" class="f-select" onchange="renderAll()">
      <option value="">Todas las Cohortes</option>
    </select>
  </div>
  <div id="cost-banner" class="cost-banner"></div>
</div>

<div class="container">
  
  <div class="kpi-row" id="kpi-box"></div>

  <div class="main-grid">
    <!-- COLUMNA IZQUIERDA: FUNNELS -->
    <div>
      <div class="card">
        <div class="card-h">Funnel: Meta Ads (Performance)</div>
        <div id="funnel-meta"></div>
      </div>
      <div class="card">
        <div class="card-h">Funnel: Otros Canales (Linkedin / Ref / Org)</div>
        <div id="funnel-otros"></div>
      </div>
    </div>

    <!-- COLUMNA DERECHA: TIEMPOS Y ANALISIS -->
    <div>
      <div class="card">
        <div class="card-h">Tiempos de Proceso (Promedio Días)</div>
        <div class="time-grid" id="time-box"></div>
      </div>
      <div class="card">
        <div class="card-h">Efectividad por Fuente</div>
        <div id="source-box"></div>
      </div>
      <div class="card">
        <div class="card-h">Análisis de Rechazos</div>
        <div id="reject-box"></div>
      </div>
    </div>
  </div>

  <div class="card-h" style="margin-top:40px">🏆 Ranking de Talentos (Ponderación Columna N)</div>
  <div class="rank-grid" id="ranking-box"></div>

</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxdX6ODo7znfGdi3Hw4o7HbXoVBUKTOaMYK6GXoCyxoHf8-1cfuhf-oS6F7nhJ8bsK0-Q/exec";
let STORE = { candidatos:[], entrevistas:[], finanzas:[], impresiones:[] };

async function sync() {
  const dot = document.getElementById('sync-dot');
  dot.classList.add('loading');
  const cb = 'jsonp_' + Math.round(Math.random()*1000000);
  const s = document.createElement('script');
  s.src = `${SCRIPT_URL}?accion=todos&callback=${cb}`;
  window[cb] = (res) => {
    STORE = res.data;
    if(document.getElementById('sel-cohorte').options.length <= 1) {
      const coh = [...new Set(STORE.candidatos.map(c => c.cohorte))].filter(Boolean).sort().reverse();
      coh.forEach(c => document.getElementById('sel-cohorte').add(new Option(c, c)));
    }
    renderAll();
    dot.classList.remove('loading');
    document.getElementById('sync-msg').textContent = "Actualizado: " + new Date().toLocaleTimeString();
    delete window[cb];
    document.head.removeChild(s);
  };
  document.head.appendChild(s);
}

function diffDays(d1, d2) {
  if(!d1 || !d2 || d1==='' || d2==='') return null;
  const t1 = new Date(d1), t2 = new Date(d2);
  const diff = Math.floor((t2 - t1) / (1000 * 60 * 60 * 24));
  return diff >= 0 ? diff : null;
}

function getAvg(arr) {
  const v = arr.filter(x => x !== null);
  return v.length ? (v.reduce((a,b) => a+b, 0) / v.length).toFixed(1) : "—";
}

function renderAll() {
  const f = document.getElementById('sel-cohorte').value;
  const cands = f ? STORE.candidatos.filter(c => c.cohorte === f) : STORE.candidatos;
  const imps = f ? STORE.impresiones.filter(i => i.cohorte === f) : STORE.impresiones;
  const fins = f ? STORE.finanzas.filter(i => i.cohorte === f) : STORE.finanzas;

  // COSTOS
  const mInv = imps.reduce((a,b) => a + b.gastado, 0);
  const oInv = fins.filter(i => !i.canal.includes('Meta')).reduce((a,b) => a + b.inversion, 0);
  document.getElementById('cost-banner').innerHTML = `
    Inversión Meta: <strong>$${mInv.toLocaleString()}</strong> | Otros Canales: <strong>$${oInv.toLocaleString()}</strong> | Total: <strong>$${(mInv+oInv).toLocaleString()}</strong>
  `;

  // KPIs
  const ingresados = cands.filter(c => c.estado === 'Ingresado').length;
  document.getElementById('kpi-box').innerHTML = `
    <div class="kpi-card"><div class="kpi-lbl">Postulantes (Total)</div><div class="kpi-val">${cands.length}</div></div>
    <div class="kpi-card"><div class="kpi-lbl">Ingresos Efectivos</div><div class="kpi-val" style="color:var(--verde)">${ingresados}</div></div>
    <div class="kpi-card"><div class="kpi-lbl">Costo por Lead (CPL)</div><div class="kpi-val">$${cands.length ? Math.round((mInv+oInv)/cands.length) : 0}</div></div>
    <div class="kpi-card" style="border-top-color:var(--oro)"><div class="kpi-lbl">ROI: Costo x Ingreso</div><div class="kpi-val">$${ingresados ? Math.round((mInv+oInv)/ingresados) : 0}</div></div>
  `;

  // FUNNEL META (Impresiones -> Alcance -> Resultados -> Leads BD -> Entrevista -> Ingreso -> Baja)
  const metaCands = cands.filter(c => c.fuente.toLowerCase().includes('meta'));
  const mStages = [
    {l: 'Impresiones Meta', n: imps.reduce((a,b) => a + b.impresiones, 0), c: '#adb5bd'},
    {l: 'Alcance', n: imps.reduce((a,b) => a + b.alcance, 0), c: '#868e96'},
    {l: 'Leads reportados Meta', n: imps.reduce((a,b) => a + b.resultados, 0), c: '#6366f1'},
    {l: 'Leads en BD (Meta)', n: metaCands.length, c: '#4f46e5'},
    {l: 'Entrevistados (Meta)', n: metaCands.filter(c => c.fEnt).length, c: '#f59e0b'},
    {l: 'Ingresados (Meta)', n: metaCands.filter(c => c.estado.includes('Ingresado')).length, c: '#1F6C43'},
    {l: 'Bajas Post-Ingreso', n: metaCands.filter(c => c.estado === 'Ingresado/Baja').length, c: '#ef4444'}
  ];
  renderFunnel('funnel-meta', mStages);

  // FUNNEL OTROS
  const oCands = cands.filter(c => !c.fuente.toLowerCase().includes('meta'));
  const oStages = [
    {l: 'Leads en BD (Otros)', n: oCands.length, c: '#6c757d'},
    {l: 'Entrevistados', n: oCands.filter(c => c.fEnt).length, c: '#f59e0b'},
    {l: 'Entrevista con Broker', n: oCands.filter(c => c.fBrok).length, c: '#d97706'},
    {l: 'Ingresados', n: oCands.filter(c => c.estado.includes('Ingresado')).length, c: '#1F6C43'}
  ];
  renderFunnel('funnel-otros', oStages);

  // TIEMPOS
  document.getElementById('time-box').innerHTML = `
    <div class="time-item"><span class="time-val">${getAvg(cands.map(c => diffDays(c.fPost, c.fCont)))}</span><span class="time-lbl">Postulación → Contacto</span></div>
    <div class="time-item"><span class="time-val">${getAvg(cands.map(c => diffDays(c.fCont, c.fEnt)))}</span><span class="time-lbl">Contacto → Entrevista</span></div>
    <div class="time-item"><span class="time-val">${getAvg(cands.map(c => diffDays(c.fEnt, c.fBrok)))}</span><span class="time-lbl">Entrevista → Broker</span></div>
    <div class="time-item"><span class="time-val">${getAvg(cands.map(c => diffDays(c.fPost, c.fIng)))}</span><span class="time-lbl">Total Proceso (Días)</span></div>
  `;

  drawBars('source-box', cands, 'fuente');
  drawBars('reject-box', cands.filter(c => c.estado === 'Rechazado/Baja'), 'motivo');

  // RANKING
  const rank = STORE.entrevistas.filter(e => !f || e.cohorte === f).sort((a,b) => b.total - a.total);
  document.getElementById('ranking-box').innerHTML = rank.map(r => `
    <div class="kpi-card rank-card">
      <div class="kpi-lbl">${r.cohorte}</div>
      <div style="font-family:Playfair Display; font-size:20px; font-weight:700; margin-top:8px">${r.candidato}</div>
      <div class="score-badge">${r.total} <span style="font-size:12px; color:var(--muted)">/ 35</span></div>
      <div style="margin-top:20px; font-size:12px; line-height:1.6">
        <strong>Fortaleza:</strong> ${r.fortaleza || '—'}<br>
        <strong style="color:var(--muted)">Debilidad:</strong> ${r.debilidad || '—'}
      </div>
    </div>
  `).join('');
}

function renderFunnel(id, stages) {
  document.getElementById(id).innerHTML = stages.map((s, i) => {
    const w = 100 - (i*7);
    const eff = (i > 0 && stages[i-1].n > 0) ? `⬇ Eficiencia: ${((s.n/stages[i-1].n)*100).toFixed(1)}%` : '';
    return `<div class="funnel-stage" style="width:${w}%">
      <div class="conv-arrow">${eff}</div>
      <div class="stage-pill" style="background:${s.c}">${s.l} <span>${s.n.toLocaleString()}</span></div>
    </div>`;
  }).join('');
}

function drawBars(id, data, key) {
  const counts = data.reduce((acc, curr) => { let v = curr[key] || 'Sin datos'; acc[v] = (acc[v] || 0) + 1; return acc; }, {});
  const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]);
  const max = sorted.length ? sorted[0][1] : 1;
  document.getElementById(id).innerHTML = sorted.map(([label, val]) => `
    <div class="bar-row">
      <div class="bar-txt"><span>${label}</span><span>${val}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${(val/max)*100}%"></div></div>
    </div>
  `).join('');
}

sync();
setInterval(sync, 180000);
</script>
</body>
</html>
