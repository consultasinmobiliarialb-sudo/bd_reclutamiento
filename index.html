<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LB · Business Intelligence v7.1</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --verde:#1F6C43; --verde-dark:#155232; --oro:#D4AF37; --oro-dark:#b8960f;
  --bg:#f0f2f0; --surface:#ffffff; --text:#1a1a1a; --muted:#6c757d; --border:#dce1de;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}

/* HEADER & FILTERS */
header{background:var(--verde-dark);color:white;padding:15px 40px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:1000}
.logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:700}
.logo span{color:var(--oro)}
.filter-panel{background:white;padding:20px 40px;border-bottom:1px solid var(--border);display:flex;gap:20px;flex-wrap:wrap;align-items:flex-end}
.f-select{padding:10px;border-radius:6px;border:1px solid var(--border);min-width:180px;font-size:13px}
.pill-container{display:flex;gap:8px;flex-wrap:wrap;padding:10px 40px;background:white}
.pill{background:#e8f5ee;color:var(--verde);padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:8px}

/* KPI & CARDS */
.container{max-width:1650px;margin:25px auto;padding:0 40px}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit, minmax(240px, 1fr));gap:20px;margin-bottom:25px}
.kpi-card{background:white;padding:25px;border-radius:15px;border:1px solid var(--border);border-top:5px solid var(--verde)}
.kpi-val{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--verde-dark)}

/* DASHBOARD LAYOUT */
.dashboard-grid{display:grid;grid-template-columns: 1fr 1.2fr; gap:25px}
.card{background:white;padding:25px;border-radius:15px;border:1px solid var(--border);margin-bottom:25px}
.card-header{font-family:'Playfair Display',serif;font-size:18px;margin-bottom:20px;color:var(--verde-dark);border-bottom:2px solid var(--bg);padding-bottom:12px}

/* FUNNELS - RESTORED */
.funnel-stage{margin-bottom:8px;display:flex;flex-direction:column;align-items:center}
.stage-pill{padding:10px 15px;color:white;border-radius:8px;display:flex;justify-content:space-between;width:100%;font-weight:700;font-size:12px}
.conv-arrow{font-size:10px;color:var(--verde);font-weight:800;padding:4px 0}

/* TIMES - RESTORED */
.time-grid{display:grid;grid-template-columns:repeat(2, 1fr);gap:15px}
.time-item{background:var(--bg);padding:20px;border-radius:12px;text-align:center;border:1px solid var(--border)}
.time-val{font-size:28px;font-weight:700;color:var(--verde-dark);display:block}
.time-lbl{font-size:10px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-top:5px}

/* BARS */
.bar-row{margin-bottom:15px}
.bar-info{display:flex;justify-content:space-between;font-size:12px;font-weight:600;margin-bottom:5px}
.bar-track{background:#eee;height:12px;border-radius:6px;overflow:hidden}
.bar-fill{height:100%;background:var(--verde);border-radius:6px;transition:width 1s ease}

.view{display:none}.view.active{display:block}
.nav-tabs{display:flex;gap:30px;margin-bottom:25px;border-bottom:2px solid var(--border)}
.tab{padding:10px 5px;cursor:pointer;font-weight:700;color:var(--muted)}
.tab.active{color:var(--verde);border-bottom-color:var(--verde)}

.sync-dot{width:10px;height:10px;border-radius:50%;background:#4ade80}
.sync-dot.loading{animation:pulse 1s infinite;background:var(--oro)}
@keyframes pulse{50%{opacity:0.2}}
</style>
</head>
<body>

<header>
  <div class="logo">Landriani<span>Blenkmann</span> Performance Hub</div>
  <div style="display:flex;align-items:center;gap:12px;font-size:12px">
    <div id="sync-dot" class="sync-dot"></div>
    <span id="sync-msg">Cargando...</span>
  </div>
</header>

<div class="filter-panel">
  <div style="display:flex; flex-direction:column; gap:5px">
    <label style="font-size:10px; font-weight:700; color:var(--muted)">COHORTES (MULTI)</label>
    <select id="sel-cohorte" class="f-select" onchange="addPill(this.value)">
      <option value="">Añadir Cohorte...</option>
    </select>
  </div>
  <div style="display:flex; flex-direction:column; gap:5px">
    <label style="font-size:10px; font-weight:700; color:var(--muted)">AÑO</label>
    <select id="sel-anio" class="f-select" onchange="renderAll()">
      <option value="">Todos</option>
      <option value="2025">2025</option><option value="2026">2026</option>
    </select>
  </div>
  <button onclick="clearFilters()" style="padding:10px 20px; border-radius:6px; background:#fff; border:1px solid var(--border); font-weight:700; cursor:pointer">Limpiar Filtros</button>
</div>
<div id="pills-container" class="pill-container"></div>

<div class="container">
  <div class="nav-tabs">
    <div class="tab active" onclick="switchTab('dash', this)">📊 PERFORMANCE ESTRATÉGICO</div>
    <div class="tab" onclick="switchTab('rank', this)">🏆 RANKING DE TALENTO</div>
  </div>

  <!-- DASHBOARD -->
  <div id="v-dash" class="view active">
    <div id="cost-banner" style="background:white; padding:15px 25px; border-radius:12px; border:1px solid var(--border); margin-bottom:20px; font-size:13px; border-left:5px solid var(--oro)"></div>
    <div class="kpi-row" id="kpi-box"></div>

    <div class="dashboard-grid">
      <div>
        <div class="card">
          <div class="card-header">Funnel: Meta Ads</div>
          <div id="funnel-meta"></div>
        </div>
        <div class="card">
          <div class="card-header">Funnel: Otros Canales</div>
          <div id="funnel-otros"></div>
        </div>
      </div>
      <div>
        <div class="card">
          <div class="card-header">Lead Time (Promedio Días)</div>
          <div class="time-grid" id="time-box"></div>
        </div>
        <div class="card">
          <div class="card-header">Distribución por Fuente</div>
          <div id="source-box"></div>
        </div>
        <div class="card">
          <div class="card-header">Motivos de Rechazo</div>
          <div id="reject-box"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- RANKING -->
  <div id="v-rank" class="view">
    <div class="kpi-row" id="ranking-grid" style="grid-template-columns: repeat(auto-fit, minmax(380px, 1fr))"></div>
  </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby9__IcKgeFcpGY9R6H-p8CC7zUPS8QF78abTseT1hMEW7xDRslilko3hzCxHGrj-uyuw/exec";
let STORE = { candidatos:[], entrevistas:[], finanzas:[], impresiones:[] };
let filterCohortes = [];

async function sync() {
  document.getElementById('sync-dot').classList.add('loading');
  const cb = 'jsonp_' + Math.round(Math.random()*1000000);
  const s = document.createElement('script');
  s.src = `${SCRIPT_URL}?accion=todos&callback=${cb}`;
  window[cb] = (res) => {
    STORE = res.data;
    if(document.getElementById('sel-cohorte').options.length <= 1) {
      const coh = [...new Set(STORE.candidatos.map(c => c.cohorte))].filter(Boolean).sort().reverse();
      coh.forEach(c => document.getElementById('sel-cohorte').add(new Option(c, c)));
    }
    renderAll();
    document.getElementById('sync-dot').classList.remove('loading');
    document.getElementById('sync-msg').textContent = "Sincronizado: " + new Date().toLocaleTimeString();
    delete window[cb];
    document.head.removeChild(s);
  };
  document.head.appendChild(s);
}

function addPill(val) {
  if(!val || filterCohortes.includes(val)) return;
  filterCohortes.push(val);
  updatePills();
  renderAll();
}

function removePill(val) {
  filterCohortes = filterCohortes.filter(c => c !== val);
  updatePills();
  renderAll();
}

function updatePills() {
  document.getElementById('pills-container').innerHTML = filterCohortes.map(c => `
    <div class="pill">${c} <span onclick="removePill('${c}')" style="cursor:pointer">✕</span></div>
  `).join('');
}

function clearFilters() {
  filterCohortes = [];
  document.getElementById('sel-anio').value = "";
  updatePills();
  renderAll();
}

function diffDays(d1, d2) {
  if(!d1 || !d2 || d1==='' || d2==='') return null;
  const t1 = new Date(d1), t2 = new Date(d2);
  const diff = Math.floor((t2 - t1) / (1000 * 60 * 60 * 24));
  return diff >= 0 ? diff : null;
}

function getAvg(arr) {
  const valid = arr.filter(v => v !== null);
  return valid.length ? (valid.reduce((a,b) => a+b, 0) / valid.length).toFixed(1) : "—";
}

function renderAll() {
  const anio = document.getElementById('sel-anio').value;

  // FILTRADO
  let cands = STORE.candidatos;
  if(filterCohortes.length) cands = cands.filter(c => filterCohortes.includes(c.cohorte));
  if(anio) cands = cands.filter(c => c.fPost.includes(anio));

  let imps = STORE.impresiones;
  if(filterCohortes.length) imps = imps.filter(i => filterCohortes.includes(i.cohorte));

  let fins = STORE.finanzas;
  if(filterCohortes.length) fins = fins.filter(i => filterCohortes.includes(i.cohorte));

  // COSTOS
  const mGastado = imps.reduce((a,b) => a + b.gastado, 0);
  const oGastado = fins.filter(i => !i.canal.includes('Meta')).reduce((a,b) => a + b.inversion, 0);
  const tGastado = mGastado + oGastado;

  document.getElementById('cost-banner').innerHTML = `
    <strong>Inversión Meta:</strong> $${mGastado.toLocaleString()} | 
    <strong>Otros Canales:</strong> $${oGastado.toLocaleString()} | 
    <strong>Inversión Total:</strong> $${tGastado.toLocaleString()}
  `;

  // KPIs
  const ing = cands.filter(c => c.estado === 'Ingresado').length;
  const baja = cands.filter(c => c.estado === 'Ingresado/Baja').length;
  const totalIng = ing + baja;

  document.getElementById('kpi-box').innerHTML = `
    <div class="kpi-card"><div class="kpi-label">Leads Totales</div><div class="kpi-val">${cands.length}</div></div>
    <div class="kpi-card"><div class="kpi-label">Ingresos Efectivos</div><div class="kpi-val">${totalIng}</div></div>
    <div class="kpi-card"><div class="kpi-label">Costo x Lead</div><div class="kpi-val">$${cands.length ? Math.round(tGastado/cands.length) : 0}</div></div>
    <div class="kpi-card" style="border-top-color:var(--oro)"><div class="kpi-label">Costo x Ingreso (ROI)</div><div class="kpi-val">$${totalIng ? Math.round(tGastado/totalIng) : 0}</div></div>
  `;

  // FUNNEL META (6 PASOS)
  const metaCands = cands.filter(c => c.fuente.includes('Meta'));
  const metaStages = [
    {l: 'Impresiones Meta', n: imps.reduce((a,b) => a + b.impresiones, 0), c: '#adb5bd'},
    {l: 'Leads (Meta Ads)', n: imps.reduce((a,b) => a + b.resultados, 0), c: '#6366f1'},
    {l: 'Leads en BD (Meta)', n: metaCands.length, c: '#4f46e5'},
    {l: 'Entrevistados', n: metaCands.filter(c => c.fEnt).length, c: '#f59e0b'},
    {l: 'Ingresos Brutos', n: metaCands.filter(c => c.estado.includes('Ingresado')).length, c: '#1F6C43'},
    {l: 'Bajas Post-Ingreso', n: metaCands.filter(c => c.estado === 'Ingresado/Baja').length, c: '#ef4444'}
  ];
  renderFunnel('funnel-meta', metaStages);

  // FUNNEL OTROS (4 PASOS)
  const otrosCands = cands.filter(c => !c.fuente.includes('Meta'));
  const otrosStages = [
    {l: 'Leads en BD (Otros)', n: otrosCands.length, c: '#64748b'},
    {l: 'Entrevistados', n: otrosCands.filter(c => c.fEnt).length, c: '#f59e0b'},
    {l: 'Entrevista Broker', n: otrosCands.filter(c => c.fBrok).length, c: '#d97706'},
    {l: 'Ingresados', n: otrosCands.filter(c => c.estado.includes('Ingresado')).length, c: '#1F6C43'}
  ];
  renderFunnel('funnel-otros', otrosStages);

  // TIEMPOS
  document.getElementById('time-box').innerHTML = `
    <div class="time-item"><span class="time-val">${getAvg(cands.map(c => diffDays(c.fPost, c.fCont)))}</span><span class="time-lbl">Postulación → Contacto</span></div>
    <div class="time-item"><span class="time-val">${getAvg(cands.map(c => diffDays(c.fCont, c.fEnt)))}</span><span class="time-lbl">Contacto → Entrevista</span></div>
    <div class="time-item"><span class="time-val">${getAvg(cands.map(c => diffDays(c.fEnt, c.fBrok)))}</span><span class="time-lbl">Entrevista → Broker</span></div>
    <div class="time-item"><span class="time-val">${getAvg(cands.map(c => diffDays(c.fPost, c.fIng)))}</span><span class="time-lbl">Proceso Total (Días)</span></div>
  `;

  // BARRAS
  drawBars('source-box', cands, 'fuente');
  drawBars('reject-box', cands.filter(c => c.estado === 'Rechazado/Baja'), 'motivo');

  // RANKING (CORREGIDO SCORE)
  const rank = STORE.entrevistas.filter(e => !filterCohortes.length || filterCohortes.includes(e.cohorte)).sort((a,b) => b.total - a.total);
  document.getElementById('ranking-grid').innerHTML = rank.map(r => `
    <div class="kpi-card" style="border-left:8px solid ${r.total >= 30 ? 'var(--verde)' : r.total >= 22 ? 'var(--oro)' : '#ef4444'}">
      <div class="kpi-label">${r.cohorte}</div>
      <div style="font-family:Playfair Display; font-size:22px; font-weight:700; margin:10px 0">${r.candidato}</div>
      <div style="font-size:28px; font-weight:700; color:var(--verde-dark)">${r.total} <span style="font-size:14px; color:var(--muted)">/ 35</span></div>
      <div style="margin-top:15px; font-size:12px; line-height:1.6">
        <strong>Fortaleza:</strong> ${r.fortaleza || '—'}<br>
        <strong>Debilidad:</strong> ${r.debilidad || '—'}
      </div>
    </div>
  `).join('');
}

function renderFunnel(id, stages) {
  document.getElementById(id).innerHTML = stages.map((s, i) => {
    const w = 100 - (i*7);
    const labelEff = s.l.includes('Baja') ? "Tasa Deserción" : "Eficiencia";
    const eff = (i > 0 && stages[i-1].n > 0) ? `<div class="conv-arrow">⬇ ${labelEff}: ${((s.n/stages[i-1].n)*100).toFixed(1)}%</div>` : '';
    return `
      <div class="funnel-stage" style="width:${w}%">
        ${eff}
        <div class="stage-pill" style="background:${s.c}">${s.l} <span>${s.n.toLocaleString()}</span></div>
      </div>
    `;
  }).join('');
}

function drawBars(id, data, key) {
  const counts = data.reduce((acc, curr) => { let v = curr[key] || 'Sin datos'; acc[v] = (acc[v] || 0) + 1; return acc; }, {});
  const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]);
  const max = sorted.length ? sorted[0][1] : 1;
  document.getElementById(id).innerHTML = sorted.map(([label, val]) => `
    <div class="bar-row">
      <div class="bar-info"><span>${label}</span><span>${val}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${(val/max)*100}%"></div></div>
    </div>
  `).join('');
}

function switchTab(v, el) {
  document.querySelectorAll('.view').forEach(x => x.style.display = 'none');
  document.getElementById('view-'+v).style.display = 'block';
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
}

sync();
</script>
</body>
</html>
